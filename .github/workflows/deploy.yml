name: Publicar no GitHub Pages

# Publica o jogo automaticamente sempre que algo chega na branch main
# (por exemplo, ao mesclar um pull request). Também dá para rodar na mão
# pela aba "Actions" > "Publicar no GitHub Pages" > "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões que o deploy precisa
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy roda por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar o GitHub Pages (liga automaticamente se preciso)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site (a raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
